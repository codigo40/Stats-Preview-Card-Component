<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/logoAzul.png">

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <!-- STYLES -->
  <link rel="stylesheet" href="./Styles/main.css">
  <title>Frontend Mentor | Stats preview card component</title>

  
</head>
<body>
  <main class="main">
    <div class="main__card">
      <picture class="main__card-img">
        <source media="(max-width:375px)" srcset="./images/image-header-mobile.jpg">
        <img class="main__card-img--responsive" src="./images/image-header-desktop.jpg" alt="Women working">
        <div class="main__card-img-filter"></div>

      <div class="main__card-info">
        <h1 class="main__card-info-title">
          Get <span class="main__card-info-title--span">insights</span> that help your business grow.
        </h1>
        
        <p class="main__card-info-paragraph">
          Discover the benefits of data analytics and make better decisions regarding revenue, customer experience, and overall efficiency.
        </p>

        <div class="main__card-info-data">
          <div class="main__card-info-data--item">
            <span class="main__card-info-data--number">10k+</span>
            <span class="main__card-info-data--detail">companies</span>
          </div>

          <div class="main__card-info-data--item">
            <span class="main__card-info-data--number">314</span>
            <span class="main__card-info-data--detail">templates</span>
          </div>

          <div class="main__card-info-data--item">
            <span class="main__card-info-data--number">12m+</span>
            <span class="main__card-info-data--detail">queries</span>
          </div>
        </div>
      </div>

     
      </picture>
    </div>
  </main>
</body>
</html>
